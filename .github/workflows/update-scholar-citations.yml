name: Update Google Scholar citations

# Keeps citations.json fresh so the website can show a live citation count.
# Runs daily (controlled, scheduled requests avoid Scholar's rate-limit/CAPTCHA
# better than live browser scraping) and can be triggered manually.

on:
  schedule:
    - cron: '0 8 * * *'   # every day at 08:00 UTC
  workflow_dispatch:        # manual "Run workflow" button
  push:
    paths:
      - '.github/workflows/update-scholar-citations.yml'

permissions:
  contents: write

concurrency:
  group: scholar-citations
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch citation count
        env:
          SCHOLAR_ID: '2ssVmugAAAAJ'
          # OPTIONAL but recommended for reliability: add a repo secret named
          # SERPAPI_KEY (free tier at serpapi.com) — Scholar blocks plain
          # scraping intermittently; SerpAPI is the robust path.
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: |
          python - <<'PY'
          import json, os, re, sys, datetime, urllib.request

          sid = os.environ["SCHOLAR_ID"]
          serp = os.environ.get("SERPAPI_KEY", "").strip()
          now = datetime.datetime.now(datetime.timezone.utc).isoformat()

          def http_get(url):
              req = urllib.request.Request(url, headers={
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                                "AppleWebKit/537.36 (KHTML, like Gecko) "
                                "Chrome/124.0 Safari/537.36",
                  "Accept-Language": "en-US,en;q=0.9",
              })
              with urllib.request.urlopen(req, timeout=30) as r:
                  return r.read().decode("utf-8", "replace")

          result = None

          # 1) SerpAPI (reliable) if a key is configured.
          if serp:
              try:
                  u = ("https://serpapi.com/search.json?engine=google_scholar_author"
                       f"&author_id={sid}&api_key={serp}")
                  data = json.loads(http_get(u))
                  table = data.get("cited_by", {}).get("table", [])
                  def pick(name):
                      for row in table:
                          if name in row:
                              return row[name].get("all")
                      return None
                  result = {
                      "citations": pick("citations"),
                      "hindex": pick("h_index"),
                      "i10index": pick("i10_index"),
                      "source": "serpapi",
                  }
              except Exception as e:
                  print("SerpAPI failed:", e)

          # 2) Direct scrape fallback.
          if not result or result.get("citations") is None:
              try:
                  html = http_get(f"https://scholar.google.com/citations?user={sid}&hl=en")
                  nums = re.findall(r'gsc_rsb_std[^>]*>\s*([\d,]+)\s*<', html)
                  if nums:
                      vals = [int(n.replace(",", "")) for n in nums]
                      # order: citations(all), citations(since), h(all), h(since), i10(all), i10(since)
                      result = {
                          "citations": vals[0] if len(vals) > 0 else None,
                          "hindex":    vals[2] if len(vals) > 2 else None,
                          "i10index":  vals[4] if len(vals) > 4 else None,
                          "source": "scrape",
                      }
                  else:
                      print("No stats found (likely CAPTCHA).")
              except Exception as e:
                  print("Scrape failed:", e)

          if not result or result.get("citations") is None:
              print("Could not fetch citation count this run; leaving citations.json unchanged.")
              sys.exit(0)

          result["updated"] = now
          result.pop("_note", None)
          with open("citations.json", "w") as f:
              json.dump(result, f, indent=2)
              f.write("\n")
          print("Wrote citations.json:", result)
          PY

      - name: Commit if changed
        run: |
          if git diff --quiet citations.json; then
            echo "No change."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add citations.json
            git commit -m "chore: update Google Scholar citation count [skip ci]"
            git push
          fi
